    <!-- In-App Browser Escape Script -->
    <script>
        (function () {
            var userAgent = navigator.userAgent.toLowerCase();
            if (userAgent.match(/kakaotalk/i)) {
                var url = location.href;
                // Android
                if (userAgent.match(/android/i)) {
                    location.href = 'intent://' + location.href.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
                }
                // iOS
                else if (userAgent.match(/iphone|ipad|ipod/i)) {
                    // KakaoTalk cache server bypass trick for iOS isn't reliable anymore.
                    // The standard approach is to show an overlay guiding the user to Safari.
                    document.addEventListener('DOMContentLoaded', function () {
                        var overlay = document.createElement('div');
                        overlay.style.position = 'fixed';
                        overlay.style.top = '0';
                        overlay.style.left = '0';
                        overlay.style.width = '100vw';
                        overlay.style.height = '100vh';
                        overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.95)';
                        overlay.style.color = 'white';
                        overlay.style.zIndex = '999999';
                        overlay.style.display = 'flex';
                        overlay.style.flexDirection = 'column';
                        overlay.style.alignItems = 'center';
                        overlay.style.justifyContent = 'center';
                        overlay.style.textAlign = 'center';
                        overlay.style.padding = '20px';
                        overlay.innerHTML = `
                            <div style="font-size: 24px; margin-bottom: 20px;">⚠️ 브라우저 호환성 안내</div>

                                상단의 <span style="color: #4CAF50;">[ ⠇] 버튼</span>을 누른 뒤<br/>
                                <strong>'다른 브라우저로 열기'</strong>를 선택해주세요.
                            </div>
                        `;
                        document.body.appendChild(overlay);
                    });
                }
            }
        })();
    </script>
